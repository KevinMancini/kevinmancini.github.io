summary: >-
  I am a mathematician and computer scientist specializing in stochastic and machine
  learning models for random systems. My work sits at the intersection of mathematics,
  computer science, and graph-based learning.
research_focus: >-
  My research focuses on topology- and geometry-aware learning, information flow control,
  and graph neural networks designed to better capture both long- and short-range
  interactions.
current_note: >-
  Alongside research in machine learning, I am currently pursuing advanced study in
  applied mathematics, stochastic calculus, and probability.
