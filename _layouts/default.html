<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title %}{{ page.title }} · {% endif %}{{ site.data.profile.name }}</title>
    <meta name="description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 155 }}{% else %}{{ site.description }}{% endif %}" />
    <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}" />
  </head>
  <body>
    <header class="site-header">
      <div class="container header-shell">
        <div class="brand-block">
          <a class="brand" href="{{ '/' | relative_url }}">{{ site.data.profile.name }}</a>
          <p class="brand-subtitle">{{ site.data.profile.role }}</p>
        </div>
        <nav class="site-nav" aria-label="Primary navigation">
          {% for item in site.data.navigation %}
            <a href="{{ item.url | relative_url }}" {% if page.url == item.url %}class="active"{% endif %}>{{ item.title }}</a>
          {% endfor %}
        </nav>
      </div>
    </header>

    <main>
      {{ content }}
    </main>

    <footer class="site-footer">
      <div class="container footer-shell">
        <div>
          <p class="footer-title">{{ site.data.profile.name }}</p>
          <p class="footer-note">{{ site.data.profile.role }} · {{ site.data.profile.location }}</p>
        </div>
        <div class="footer-links">
          <a href="mailto:{{ site.data.profile.email }}">Email</a>
          <a href="{{ site.data.profile.cv }}">CV</a>
          <a href="{{ site.data.profile.scholar }}">Scholar</a>
          <a href="{{ site.data.profile.linkedin }}">LinkedIn</a>
          <a href="{{ site.data.profile.github }}">GitHub</a>
        </div>
      </div>
    </footer>
  </body>
</html>
