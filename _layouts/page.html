---
layout: default
---
<section class="page-hero">
  <div class="container narrow">
    {% if page.kicker %}<p class="eyebrow">{{ page.kicker }}</p>{% endif %}
    <h1>{{ page.title }}</h1>
    {% if page.intro %}<p class="lead page-intro">{{ page.intro }}</p>{% endif %}
  </div>
</section>

<section class="page-content">
  <div class="container narrow">
    {{ content }}
  </div>
</section>
